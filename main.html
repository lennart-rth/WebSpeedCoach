<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web SpeedCoach</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent: #ff3b30;
            --active: #34c759;
            --border: #333333;
            --inactive: #555555;
            --modal-bg: rgba(0, 0, 0, 0.85);
            --card-bg: #1c1c1e;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Main Dashboard */
        #dashboard {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 2px;
            background-color: var(--border);
        }

        .metric {
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .label {
            font-size: 3vh;
            color: #aaaaaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            transition: color 0.3s;
        }

        .label.rest-mode { color: var(--active); }

        .value {
            font-size: 14vh;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .unit {
            font-size: 4vh;
            color: #888888;
            margin-left: 5px;
        }

        /* Bottom Controls */
        #controls {
            height: 60px;
            display: flex;
            background-color: #111;
            border-top: 2px solid var(--border);
            align-items: center;
            padding: 0 20px;
            gap: 15px;
        }

        #btn-settings {
            background: transparent;
            border: none;
            font-size: 28px;
            cursor: pointer;
            padding: 0 10px 0 0;
            color: white;
            transition: opacity 0.2s;
        }

        #btn-settings:disabled { opacity: 0.3; cursor: not-allowed; }

        #lap-info {
            flex: 1;
            font-size: 20px;
            color: #aaa;
            font-weight: bold;
        }
        
        .status-mode-work { color: var(--accent) !important; }
        .status-mode-rest { color: var(--active) !important; }

        /* Status Icons */
        .status-container { display: flex; gap: 15px; margin-right: 15px; }
        .status-icon { width: 28px; height: 28px; fill: var(--inactive); transition: fill 0.3s ease; }
        .status-icon.active { fill: var(--active); }
        .status-icon.error { fill: var(--accent); }

        button {
            padding: 10px 30px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
        }

        #btn-lap { background-color: #444; color: white; }
        #btn-start { background-color: var(--active); color: white; min-width: 120px; }
        #btn-start.running { background-color: var(--accent); }

        /* Setup Modal */
        #modal-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--modal-bg); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        
        .hidden { display: none !important; }

        #setup-card {
            background: var(--card-bg); padding: 25px; border-radius: 16px;
            width: 80%; max-width: 400px; border: 1px solid var(--border);
        }
        #setup-card h2 { margin-top: 0; text-align: center; }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        .form-group label { color: #aaa; font-weight: bold; font-size: 16px; }
        .form-group select, .form-group input {
            padding: 12px; font-size: 18px; border-radius: 8px; border: 1px solid var(--border);
            background: #000; color: white; outline: none;
        }
        #btn-save-settings { width: 100%; background: var(--active); padding: 15px; font-size: 20px; }

        /* BIG Interval Notification Overlay */
        #interval-alert {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000;
            pointer-events: none; /* Let clicks pass through to Stop button if needed */
            opacity: 0;
            transition: opacity 0.2s;
        }
        #interval-alert.show { opacity: 1; }
        #alert-text { font-size: 12vw; font-weight: 900; color: var(--active); letter-spacing: 5px; }

        @media (orientation: portrait) {
            #dashboard { grid-template-columns: 1fr; grid-template-rows: repeat(4, 1fr); }
            .value { font-size: 10vh; }
        }
    </style>
</head>
<body>

    <!-- Interval Notification -->
    <div id="interval-alert">
        <div id="alert-text">REST</div>
    </div>

    <!-- Workout Setup Modal -->
    <div id="modal-overlay" class="hidden">
        <div id="setup-card">
            <h2>Workout Target</h2>
            <div class="form-group">
                <label>Workout Mode:</label>
                <select id="setup-type">
                    <option value="free">Just Go (Free Row)</option>
                    <option value="distance">Interval Distance (m)</option>
                    <option value="time">Interval Time (min)</option>
                </select>
            </div>
            <div class="form-group hidden" id="val-group">
                <label id="val-label">Target Value:</label>
                <input type="number" id="setup-val" min="1" step="any" placeholder="e.g. 1000">
            </div>
            <button id="btn-save-settings">Save Target</button>
        </div>
    </div>

    <div id="dashboard">
        <div class="metric">
            <div class="label">Pace / 500m</div>
            <div class="value" id="val-pace">--:--</div>
        </div>
        <div class="metric">
            <div class="label">Rate</div>
            <div class="value"><span id="val-spm">0</span><span class="unit">spm</span></div>
        </div>
        <div class="metric">
            <div class="label" id="label-time">Lap Time</div>
            <div class="value" id="val-time">0:00.0</div>
        </div>
        <div class="metric">
            <div class="label" id="label-dist">Lap Distance</div>
            <div class="value"><span id="val-dist">0</span><span class="unit">m</span></div>
        </div>
    </div>

    <div id="controls">
        <button id="btn-settings" title="Setup Workout">⚙️</button>
        <div id="lap-info">LAP: 1</div>
        
        <div class="status-container">
            <svg id="icon-accel" class="status-icon" viewBox="0 0 24 24">
                <path d="M16 6l-2.5 8.5L9.5 4 6 12H2v2h5.5l2-5.5L13.5 20l3.5-12H22v-2h-6z"/>
            </svg>
            <svg id="icon-gps" class="status-icon" viewBox="0 0 24 24">
                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
            </svg>
        </div>

        <button id="btn-lap" disabled>Lap</button>
        <button id="btn-start">Start</button>
    </div>

    <script>
        // --- DOM Elements ---
        const uiPace = document.getElementById('val-pace');
        const uiSpm = document.getElementById('val-spm');
        const uiTime = document.getElementById('val-time');
        const uiDist = document.getElementById('val-dist');
        const uiTimeLabel = document.getElementById('label-time');
        const uiDistLabel = document.getElementById('label-dist');
        const uiLapInfo = document.getElementById('lap-info');
        
        const btnStart = document.getElementById('btn-start');
        const btnLap = document.getElementById('btn-lap');
        const btnSettings = document.getElementById('btn-settings');
        const iconGps = document.getElementById('icon-gps');
        const iconAccel = document.getElementById('icon-accel');

        const modal = document.getElementById('modal-overlay');
        const selectType = document.getElementById('setup-type');
        const inputVal = document.getElementById('setup-val');
        const valGroup = document.getElementById('val-group');
        const btnSaveSettings = document.getElementById('btn-save-settings');

        const alertOverlay = document.getElementById('interval-alert');

        // --- State Variables ---
        let isRunning = false;
        let lapCount = 1;
        let intervalState = 'work'; // 'work' or 'rest'
        
        // Target Settings
        let targetType = 'free'; // 'free', 'distance', 'time'
        let targetValue = 0;     // meters or milliseconds
        
        let sessionStartTime = 0;
        let lapStartTime = 0;
        let elapsedLapTime = 0;
        
        let totalDistance = 0;
        let lapDistance = 0;
        let lastPosition = null;
        let speedBuffer = []; 

        let timerInterval;
        let geoWatchId;
        let wakeLock = null;
        let audioCtx = null;

        let lastGpsTime = 0;
        let lastAccelTime = 0;

        // Stroke Tracking
        let lastStrokeTime = 0;
        let strokeIntervals = [];
        let accelBuffer = [];     
        let previousMag = null;   

        // --- Settings Modal Logic ---
        btnSettings.addEventListener('click', () => {
            if (!isRunning) modal.classList.remove('hidden');
        });

        selectType.addEventListener('change', () => {
            if (selectType.value === 'free') {
                valGroup.classList.add('hidden');
            } else {
                valGroup.classList.remove('hidden');
                if (selectType.value === 'distance') {
                    document.getElementById('val-label').innerText = 'Distance (meters):';
                    inputVal.placeholder = 'e.g. 1000';
                } else {
                    document.getElementById('val-label').innerText = 'Time (minutes):';
                    inputVal.placeholder = 'e.g. 5';
                }
            }
        });

        btnSaveSettings.addEventListener('click', () => {
            targetType = selectType.value;
            if (targetType === 'distance') {
                targetValue = parseInt(inputVal.value) || 1000;
            } else if (targetType === 'time') {
                targetValue = (parseFloat(inputVal.value) || 1) * 60000; 
            } else {
                targetValue = 0;
            }
            intervalState = 'work';
            updateLabels();
            modal.classList.add('hidden');
        });

        // --- Audio Beep System ---
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playBeep() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5 note
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.8);
            osc.stop(audioCtx.currentTime + 0.8);
        }

        function showOverlay() {
            alertOverlay.classList.add('show');
            setTimeout(() => { alertOverlay.classList.remove('show'); }, 2000);
        }

        function updateLabels() {
            // Update Top Labels based on state
            if (targetType === 'free') {
                uiTimeLabel.innerText = "Lap Time";
                uiDistLabel.innerText = "Lap Distance";
                uiTimeLabel.classList.remove('rest-mode');
                uiDistLabel.classList.remove('rest-mode');
                uiLapInfo.innerText = `LAP: ${lapCount}`;
                uiLapInfo.className = '';
            } else if (intervalState === 'rest') {
                uiTimeLabel.innerText = "Rest Time";
                uiDistLabel.innerText = "Rest Dist";
                uiTimeLabel.classList.add('rest-mode');
                uiDistLabel.classList.add('rest-mode');
                uiLapInfo.innerText = `LAP: ${lapCount} (REST)`;
                uiLapInfo.className = 'status-mode-rest';
            } else { // 'work'
                uiTimeLabel.classList.remove('rest-mode');
                uiDistLabel.classList.remove('rest-mode');
                uiLapInfo.innerText = `LAP: ${lapCount} (WORK)`;
                uiLapInfo.className = 'status-mode-work';

                if (targetType === 'distance') {
                    uiTimeLabel.innerText = "Lap Time";
                    uiDistLabel.innerText = "Rem. Dist";
                } else if (targetType === 'time') {
                    uiTimeLabel.innerText = "Rem. Time";
                    uiDistLabel.innerText = "Lap Dist";
                }
            }

            // Immediately apply zero/target values to avoid a flicker frame
            if (intervalState === 'work' && targetType === 'time') {
                uiTime.innerText = formatTime(targetValue);
                uiDist.innerText = "0";
            } else if (intervalState === 'work' && targetType === 'distance') {
                uiDist.innerText = Math.floor(targetValue);
                uiTime.innerText = "0:00.0";
            } else { // Free mode or Rest mode
                uiDist.innerText = "0";
                uiTime.innerText = "0:00.0";
            }
        }

        // --- Core Functions ---
        async function toggleWorkout() {
            if (!isRunning) {
                initAudio(); // Must init on user interaction
                
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    try {
                        const permissionState = await DeviceMotionEvent.requestPermission();
                        if (permissionState !== 'granted') alert("Accelerometer access is required.");
                    } catch (e) { console.error(e); }
                }

                try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } 
                catch (err) { console.log(`Wake Lock error: ${err.message}`); }

                startWorkout();
            } else {
                stopWorkout();
            }
        }

        function startWorkout() {
            isRunning = true;
            btnStart.textContent = "Stop";
            btnStart.classList.add("running");
            btnLap.disabled = false;
            btnSettings.disabled = true;

            const now = Date.now();
            sessionStartTime = now;
            lapStartTime = now;
            lapDistance = 0;
            lapCount = 1;
            intervalState = 'work';
            lastPosition = null;
            speedBuffer = [];
            
            accelBuffer = [];
            previousMag = null;
            lastStrokeTime = 0;
            strokeIntervals = [];

            lastGpsTime = 0;
            lastAccelTime = 0;
            iconGps.classList.remove('error');

            updateLabels();

            timerInterval = setInterval(updateTimer, 100);

            if ("geolocation" in navigator) {
                geoWatchId = navigator.geolocation.watchPosition(
                    handlePosition, handleGpsError, 
                    { enableHighAccuracy: true, maximumAge: 1000, timeout: 5000 }
                );
            } else { iconGps.classList.add('error'); }

            window.addEventListener('devicemotion', handleMotion);
        }

        function stopWorkout() {
            isRunning = false;
            btnStart.textContent = "Start";
            btnStart.classList.remove("running");
            btnLap.disabled = true;
            btnSettings.disabled = false;

            clearInterval(timerInterval);
            if (geoWatchId) navigator.geolocation.clearWatch(geoWatchId);
            window.removeEventListener('devicemotion', handleMotion);
            
            if (wakeLock !== null) { wakeLock.release(); wakeLock = null; }

            uiPace.innerText = "--:--";
            uiSpm.innerText = "0";
            iconGps.classList.remove('active', 'error');
            iconAccel.classList.remove('active');
        }

        // Triggered AUTOMATICALLY when a target counts down to 0
        function triggerRest(excessDist = 0, excessTime = 0) {
            playBeep();
            showOverlay();

            lapCount++;
            intervalState = 'rest';
            
            // Carry over excess into the rest phase so you don't lose data
            lapStartTime = Date.now() - excessTime;
            lapDistance = excessDist;
            
            updateLabels();
            
            uiTime.innerText = formatTime(excessTime);
            uiDist.innerText = Math.floor(excessDist);
        }

        // Triggered MANUALLY by the Lap button
        function triggerLap() {
            if (!isRunning) return;
            
            lapCount++;
            // If we are doing intervals, pressing Lap always starts a fresh WORK interval.
            if (targetType !== 'free') intervalState = 'work';
            
            lapStartTime = Date.now();
            lapDistance = 0;
            
            updateLabels();
        }

        function updateTimer() {
            const now = Date.now();
            elapsedLapTime = now - lapStartTime;
            
            if (targetType === 'time' && intervalState === 'work') {
                let remainingTime = targetValue - elapsedLapTime;
                if (remainingTime <= 0) {
                    triggerRest(0, -remainingTime);
                    return; 
                }
                uiTime.innerText = formatTime(remainingTime);
            } else {
                uiTime.innerText = formatTime(elapsedLapTime);
            }

            // Icons
            if (now - lastGpsTime < 5000 && lastGpsTime !== 0) {
                iconGps.classList.add('active'); iconGps.classList.remove('error');
            } else if (!iconGps.classList.contains('error')) { iconGps.classList.remove('active'); }
            if (now - lastAccelTime < 2000 && lastAccelTime !== 0) iconAccel.classList.add('active');
            else iconAccel.classList.remove('active');
        }

        function handlePosition(position) {
            if (!isRunning) return;
            lastGpsTime = Date.now();

            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            let rawSpeed = position.coords.speed; 

            if (lastPosition) {
                const distDiff = calculateHaversine(lastPosition.lat, lastPosition.lon, lat, lon);
                lapDistance += distDiff;
                
                if (targetType === 'distance' && intervalState === 'work') {
                    let remainingDist = targetValue - lapDistance;
                    if (remainingDist <= 0) {
                        triggerRest(-remainingDist, 0); 
                    } else {
                        uiDist.innerText = Math.floor(remainingDist);
                    }
                } else {
                    uiDist.innerText = Math.floor(lapDistance);
                }

                if (rawSpeed === null) {
                    const timeDiff = (position.timestamp - lastPosition.timestamp) / 1000;
                    if (timeDiff > 0) rawSpeed = distDiff / timeDiff;
                }
            }

            lastPosition = { lat, lon, timestamp: position.timestamp };

            if (rawSpeed !== null && rawSpeed >= 0) {
                speedBuffer.push(rawSpeed);
                if (speedBuffer.length > 3) speedBuffer.shift();
                const avgSpeed = speedBuffer.reduce((a, b) => a + b) / speedBuffer.length;
                updatePace(avgSpeed);
            }
        }

        function handleGpsError(err) {
            lastGpsTime = 0; 
            iconGps.classList.remove('active');
            iconGps.classList.add('error');
        }

        function updatePace(speedMs) {
            if (speedMs < 0.5) { uiPace.innerText = "--:--"; return; }
            const secondsPer500 = 500 / speedMs;
            const mins = Math.floor(secondsPer500 / 60);
            const secs = Math.floor(secondsPer500 % 60);
            uiPace.innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function handleMotion(event) {
            if (!isRunning) return;
            let acc = event.acceleration || event.accelerationIncludingGravity;
            if (!acc) return;

            let x = acc.x || 0, y = acc.y || 0, z = acc.z || 0;
            let mag = Math.sqrt(x*x + y*y + z*z);
            if (mag > 0.1) lastAccelTime = Date.now();
            if (event.acceleration === null) mag = Math.abs(mag - 9.81);

            const now = Date.now();
            accelBuffer.push({ time: now, val: mag });
            while (accelBuffer.length > 0 && now - accelBuffer[0].time > 10000) accelBuffer.shift();
            if (accelBuffer.length < 10) return;

            let minMag = Infinity, maxMag = -Infinity;
            for (let i = 0; i < accelBuffer.length; i++) {
                if (accelBuffer[i].val < minMag) minMag = accelBuffer[i].val;
                if (accelBuffer[i].val > maxMag) maxMag = accelBuffer[i].val;
            }

            const threshold = minMag + 0.1 * (maxMag - minMag);

            if (previousMag !== null && previousMag > threshold && mag <= threshold) {
                if (now - lastStrokeTime > 1000) {
                    if (lastStrokeTime > 0) {
                        strokeIntervals.push(now - lastStrokeTime);
                        if (strokeIntervals.length > 3) strokeIntervals.shift();
                        const avgInterval = strokeIntervals.reduce((a, b) => a + b) / strokeIntervals.length;
                        const spm = Math.round(60000 / avgInterval);
                        if (spm >= 15 && spm <= 60) uiSpm.innerText = spm;
                    }
                    lastStrokeTime = now;
                }
            }
            previousMag = mag; 
            if (now - lastStrokeTime > 5000) { uiSpm.innerText = "0"; strokeIntervals = []; }
        }

        function formatTime(ms) {
            const totalSec = Math.floor(ms / 1000);
            const m = Math.floor(totalSec / 60);
            const s = totalSec % 60;
            const dec = Math.floor((ms % 1000) / 100);
            return `${m}:${s.toString().padStart(2, '0')}.${dec}`;
        }

        function calculateHaversine(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
        }

        btnStart.addEventListener('click', toggleWorkout);
        btnLap.addEventListener('click', triggerLap); 
    </script>
</body>
</html>
